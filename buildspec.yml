version: 0.2

phases:
  install:
    commands:
      - echo No dependencies to install

  build:
    commands:
      - echo Packaging static files...
      - zip -r build-output.zip . -x "*.git*" "buildspec.yml"

  post_build:
    commands:
      - echo Build successful!

artifacts:
  files:
    - '**/*'
  discard-paths: no
